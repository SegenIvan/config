spring:
  config: 
    import: optional:configserver:
  datasource:
    url: jdbc:h2:mem:mydb;NON_KEYWORDS=user,order,role
    username: sa
    password: password
  h2: 
    console: 
      enabled: true
  liquibase: 
    change-log: classpath:db/changelog-master.xml
  jpa:
    show-sql: true
      properties:
        hibernate:
          format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  output:
    ansi:
      enabled: always
