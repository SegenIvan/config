spring:
 sql:
  init:
   schemaLocations: schema.sql
   dataLocations: data.sql
jpa:
  show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  output:
    ansi:
      enabled: always
